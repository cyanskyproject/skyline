<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eaf6ff;
      color: #1b1b1b;
    }

    .topbar {
      background: #4fc3ff;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: "Catull BQ", Georgia, serif;
      color: #0b4f6c;
      font-weight: normal;
    }

    .container {
      max-width: 700px;
      margin: 30px auto;
      padding: 0 16px;
    }

    .panel {
      background: #fff;
      border: 1px solid #cfefff;
      padding: 16px;
    }

    .filename {
      margin-bottom: 10px;
      color: #2f9ed6;
      min-height: 18px;
    }

    button {
      padding: 10px 14px;
      background: #4fc3ff;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .linkbox {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid #cfefff;
      background: #f5fbff;
      word-break: break-all;
      cursor: pointer;
    }

    .error {
      margin-top: 10px;
      color: #FF0000;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    .filesize-info {
      margin-top: 6px;
      font-size: 12px;
      color: gray;
    }

    .footer {
      text-align: center;
      margin: 30px 0;
      font-size: 12px;
      opacity: 0.6;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">Skyline Share</div>
    <div style="font-size:12px;">file sharing</div>
  </div>

  <div class="container">

    <div class="panel">

      <div id="fileName" class="filename"></div>

      <button onclick="pickFile()">Add to Share</button>

      <div id="errorBox" class="error"></div>

      <div id="linkBox" class="linkbox" style="display:none;"></div>

      <div class="filesize-info">
        File size limit is 20 MB for now. This is subject to change in the future.
      </div>

      <input type="file" id="fileInput" onchange="uploadFile()">

    </div>

  </div>

  <div class="footer">
    Skyline • early build
  </div>

  <script>
    const supabaseUrl = "https://jsjkpueenfdtfgxllnvv.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzamtwdWVlbmZkdGZneGxsbnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzY3ODAsImV4cCI6MjA5NTA1Mjc4MH0.lsLCGyL3xDG6fUvC1IduGU5KbX_fLRyQIz0dOkac-s0";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const MAX_SIZE = 20 * 1024 * 1024;

    const uploadTimes = [];

    function canUpload() {
      const now = Date.now();
      const recent = uploadTimes.filter(t => now - t < 120000);
      return recent.length < 5;
    }

    function recordUpload() {
      uploadTimes.push(Date.now());
    }

    function pickFile() {
      document.getElementById("fileInput").click();
    }

    async function uploadFile() {
      const input = document.getElementById("fileInput");
      const file = input.files[0];
      if (!file) return;

      const errorBox = document.getElementById("errorBox");
      const linkBox = document.getElementById("linkBox");

      errorBox.textContent = "";
      linkBox.style.display = "none";

      document.getElementById("fileName").textContent = "Selected: " + file.name;

      if (file.size > MAX_SIZE) {
        errorBox.textContent = "Uh oh! Your file is too big.";
        return;
      }

      if (!canUpload()) {
        errorBox.textContent = "Too many uploads. Wait 2 minutes.";
        return;
      }

      const safeName = file.name.replace(/\s+/g, "-");
      const filePath = crypto.randomUUID() + "-" + safeName;

      const { error } = await supabaseClient
        .storage
        .from("skyline-files")
        .upload(filePath, file);

      if (error) {
        errorBox.textContent = error.message;
        return;
      }

      recordUpload();

      const { data: urlData } = supabaseClient
        .storage
        .from("skyline-files")
        .getPublicUrl(filePath);

      const url = urlData.publicUrl;

      linkBox.style.display = "block";
      linkBox.textContent = url;

      linkBox.onclick = () => {
        navigator.clipboard.writeText(url);
        linkBox.textContent = "Copied!";
        setTimeout(() => linkBox.textContent = url, 1000);
      };
    }
  </script>

</body>
</html>
