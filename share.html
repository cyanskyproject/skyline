<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eaf6ff;
      color: #1b1b1b;
    }

    .topbar {
      background: #4fc3ff;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: "Catull BQ", Georgia, serif;
      color: #0b4f6c;
      font-weight: normal;
    }

    .container {
      max-width: 700px;
      margin: 30px auto;
      padding: 0 16px;
    }

    .panel {
      background: #fff;
      border: 1px solid #cfefff;
      padding: 16px;
    }

    .filename {
      margin-bottom: 10px;
      color: #2f9ed6;
      min-height: 18px;
    }

    button {
      padding: 10px 14px;
      background: #4fc3ff;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .linkbox {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid #cfefff;
      background: #f5fbff;
      word-break: break-all;
      cursor: pointer;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">Skyline Share</div>
    <div style="font-size:12px;">file sharing</div>
  </div>

  <div class="container">

    <div class="panel">

      <div id="fileName" class="filename"></div>

      <button onclick="pickFile()">Add to Share</button>

      <div id="linkBox" class="linkbox" style="display:none;"></div>

      <input type="file" id="fileInput" onchange="uploadFile()">

    </div>

  </div>

  <script>
    function pickFile() {
      document.getElementById("fileInput").click();
    }

    async function uploadFile() {
      const input = document.getElementById("fileInput");
      const file = input.files[0];
      if (!file) return;

      document.getElementById("fileName").textContent = "Selected: " + file.name;

      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch("/api/upload", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      const box = document.getElementById("linkBox");
      box.style.display = "block";
      box.textContent = data.url;

      box.onclick = () => {
        navigator.clipboard.writeText(data.url);
        box.textContent = "Copied!";
        setTimeout(() => box.textContent = data.url, 1000);
      };
    }
  </script>

</body>
</html>
