<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatter</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
@font-face {
  font-family: "CatullBQ";
  src: url("/fonts/Catull BQ Regular.ttf") format("truetype");
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eaf6ff;
}

.topbar {
  background: #4fc3ff;
  padding: 12px 18px;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-family: "CatullBQ", Georgia, serif;
  color: #0b4f6c;
}

.login-box {
  max-width: 360px;
  margin: 100px auto;
  background: white;
  border: 1px solid #cfefff;
  padding: 16px;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #cfefff;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: #4fc3ff;
  border: none;
  color: white;
  cursor: pointer;
}

.auth-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.auth-tabs button {
  flex: 1;
  padding: 8px;
  cursor: pointer;
}

.active-tab {
  background: #0b4f6c;
  color: white;
}

.error {
  color: red;
  font-size: 13px;
  margin-top: 6px;
}

.container {
  display: none;
  max-width: 800px;
  margin: 30px auto;
  padding: 0 16px;
}

.app {
  border: 1px solid #cfefff;
  background: white;
  display: flex;
  height: 500px;
}

.sidebar {
  width: 200px;
  border-right: 1px solid #cfefff;
  background: #f5fbff;
  padding: 10px;
}

.tab {
  padding: 10px;
  cursor: pointer;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.main {
  flex: 1;
  padding: 15px;
}

.friend-empty {
  color: gray;
  font-size: 13px;
}

.btn {
  margin-top: 10px;
  background: #4fc3ff;
  border: none;
  color: white;
  padding: 8px 10px;
  cursor: pointer;
}

.logout {
  font-size: 12px;
  cursor: pointer;
  color: #0b4f6c;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">Skyline Chatter</div>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

  <div class="auth-tabs">
    <button id="loginTab" class="active-tab" onclick="setMode('login')">Login</button>
    <button id="signupTab" onclick="setMode('signup')">Sign up</button>
  </div>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="authAction()" id="authBtn">Login</button>

  <div class="error" id="error"></div>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="app">

    <div class="sidebar">
      <div class="tab" onclick="showTab('friends')">Friends</div>
      <div class="tab" onclick="showTab('requests')">Requests</div>
    </div>

    <div class="main">

      <div id="friends" class="tab-content active">
        <h3>Friends</h3>

        <div class="friend-empty">
          You have no friends yet. Add another friend by clicking the + button.
        </div>

        <button class="btn" onclick="addFriend(prompt('User ID'))">
          + Add Friend
        </button>
      </div>

      <div id="requests" class="tab-content">
        <h3>Requests</h3>
        <p>No requests yet.</p>
      </div>

    </div>
  </div>
</div>

<script>
const supabaseUrl = "https://jsjkpueenfdtfgxllnvv.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzamtwdWVlbmZkdGZneGxsbnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzY3ODAsImV4cCI6MjA5NTA1Mjc4MH0.lsLCGyL3xDG6fUvC1IduGU5KbX_fLRyQIz0dOkac-s0";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let mode = "login";
let currentUser = null;

function setMode(m) {
  mode = m;

  document.getElementById("loginTab").classList.toggle("active-tab", m === "login");
  document.getElementById("signupTab").classList.toggle("active-tab", m === "signup");

  document.getElementById("authBtn").textContent =
    m === "login" ? "Login" : "Sign up";
}

async function authAction() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("error");

  errorBox.textContent = "";

  let result;

  if (mode === "login") {
    result = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });
  } else {
    result = await supabaseClient.auth.signUp({
      email,
      password
    });
  }

  if (result.error) {
    errorBox.textContent = result.error.message;
    return;
  }

  currentUser = result.data.user || result.data.session?.user;
  showApp();
}

async function checkUser() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    currentUser = data.session.user;
    showApp();
  }
}

checkUser();

function showApp() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function showTab(tab) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

async function addFriend(receiverId) {
  if (!receiverId) return;

  await supabaseClient.from("friend_requests").insert({
    sender: currentUser.id,
    receiver: receiverId,
    status: "pending"
  });
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
