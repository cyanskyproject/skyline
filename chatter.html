<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline Friends</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
@font-face {
  font-family: "CatullBQ";
  src: url("/fonts/Catull BQ Regular.ttf") format("truetype");
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eaf6ff;
}

/* TOP BAR */
.topbar {
  background: #4fc3ff;
  padding: 12px 18px;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-family: "CatullBQ", Georgia, serif;
  color: #0b4f6c;
}

/* LOGIN */
.login-box {
  max-width: 360px;
  margin: 100px auto;
  background: white;
  border: 1px solid #cfefff;
  padding: 16px;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #cfefff;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: #4fc3ff;
  border: none;
  color: white;
  cursor: pointer;
}

.error {
  color: red;
  font-size: 13px;
  margin-top: 6px;
}

/* APP */
.container {
  display: none;
  max-width: 800px;
  margin: 30px auto;
  padding: 0 16px;
}

.app {
  border: 1px solid #cfefff;
  background: white;
  display: flex;
  height: 500px;
}

/* SIDEBAR */
.sidebar {
  width: 200px;
  border-right: 1px solid #cfefff;
  background: #f5fbff;
  padding: 10px;
}

.tab {
  padding: 10px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 15px;
}

.friend-empty {
  color: gray;
  font-size: 13px;
}

/* BUTTON */
.btn {
  margin-top: 10px;
  background: #4fc3ff;
  border: none;
  color: white;
  padding: 8px 10px;
  cursor: pointer;
}

.logout {
  font-size: 12px;
  cursor: pointer;
  color: #0b4f6c;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">Skyline Friends</div>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h3>Login</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login / Sign up</button>

  <div class="error" id="error"></div>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="app">

    <div class="sidebar">
      <div class="tab">Friends</div>
      <div class="tab">Requests</div>
    </div>

    <div class="main">
      <h3>Friends</h3>

      <div class="friend-empty">
        You have no friends yet. Add another friend by clicking the + button, and typing their username, then waiting for them to accept your friend request.
      </div>

      <button class="btn">+ Add Friend</button>
    </div>

  </div>

</div>

<script>
const supabaseUrl = "https://jsjkpueenfdtfgxllnvv.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzamtwdWVlbmZkdGZneGxsbnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzY3ODAsImV4cCI6MjA5NTA1Mjc4MH0.lsLCGyL3xDG6fUvC1IduGU5KbX_fLRyQIz0dOkac-s0";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* CHECK SESSION ON LOAD */
async function checkUser() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    showApp();
  }
}

checkUser();

/* LOGIN */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const errorBox = document.getElementById("error");
  errorBox.textContent = "";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    errorBox.textContent = error.message;
    return;
  }

  if (data.session) {
    showApp();
  }
}

/* SHOW APP */
function showApp() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";
}

/* LOGOUT */
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
